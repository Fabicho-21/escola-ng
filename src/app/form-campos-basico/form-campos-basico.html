<h1>Exemplos de interação com o usuário</h1>

<h2>Famos olá mundo dos campos</h2>

<div id="formulario-nome-completo"> 
    <label for="nome">Nome:</label>
    <input type="text" id="nome" [(ngModel)]="nome" place-holder="Digite seu nome">
    <label for="sobrenome">Sobrenome:</label>
    <input type="text" id="sobrenome" [(ngModel)]="sobrenome" place-holder="Digite seu sobrenome">

    <button (click)="apresentarNomeCompleto()">Apresentar nome completo</button>   

    @if(resultadoNomeCompleto !== "") {
        <p>Nome completo: {{ resultadoNomeCompleto }}</p>
    }

</div>

<h2>Nossa calculadora</h2>

<div id="formulario-calculadora">
    <label for="numero01">Número 1:<span>*</span></label>
    <input id="numero01" [(ngModel)]="numero01" type="number"> 
    <label for="numero02">Número 2:<span>*</span></label>
    <input id="numero02" [(ngModel)]="numero02" type="number">

    <span>Operação <span>*</span></span>
    
    <input type="radio" id="operacao-somar" [(ngModel)]="operacao" value="somar">
    <label for="operacao-somar">Somar</label>

    <input type="radio" id="operacao-subtrair" [(ngModel)]="operacao" value="subtrair">
    <label for="operacao-subtrair">Subtrair</label>

    <input type="radio" id="operacao-multiplicar" [(ngModel)]="operacao" value="multiplicar">
    <label for="operacao-multiplicar">Multiplicar</label>

    <input type="radio" id="operacao-dividir" [(ngModel)]="operacao" value="dividir">
    <label for="operacao-dividir">Dividir</label>

    <button (click)="realizarCalculo()">Calcular</button>
</div>
